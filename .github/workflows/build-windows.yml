name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            tauri_features: ""
            artifact_suffix: ""
          - variant: cuda
            tauri_features: "--features cuda"
            artifact_suffix: "-cuda"
          - variant: vulkan
            tauri_features: "--features vulkan"
            artifact_suffix: "-vulkan"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install CUDA Toolkit
        if: matrix.variant == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust", "visual_studio_integration"]'

      # CMake 3.31+ has a broken FindCUDA module that fails to parse Windows
      # paths containing backslashes (e.g. C:\Program Files\...).  CTranslate2
      # (bundled in ct2rs) still relies on the legacy find_package(CUDA), so we
      # pin to CMake 3.30 until upstream migrates to CUDAToolkit.
      - name: Pin CMake 3.30 for CUDA build
        if: matrix.variant == 'cuda'
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: '3.30.8'

      - name: Install Vulkan SDK
        if: matrix.variant == 'vulkan'
        shell: pwsh
        run: |
          $ver = "1.3.290.0"
          $installer = "$env:TEMP\VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe" -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          $sdkPath = "C:\VulkanSDK\$ver"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.8.0
        with:
          workspaces: src-tauri
          key: ${{ matrix.variant }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app (NSIS installer)
        env:
          CFLAGS: -utf-8
          CXXFLAGS: -utf-8
          CMAKE_C_FLAGS: -utf-8
          CMAKE_CXX_FLAGS: -utf-8
          CMAKE_C_FLAGS_RELEASE: -MT -O2 -Ob2 -DNDEBUG -utf-8
          CMAKE_CXX_FLAGS_RELEASE: -MT -O2 -Ob2 -DNDEBUG -utf-8
        run: pnpm tauri build ${{ matrix.tauri_features }} --bundles nsis

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtvt-windows-installer${{ matrix.artifact_suffix }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
