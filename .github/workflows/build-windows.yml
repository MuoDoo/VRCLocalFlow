name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app (NSIS installer)
        env:
          CFLAGS: -utf-8
          CXXFLAGS: -utf-8
          CMAKE_C_FLAGS: -utf-8
          CMAKE_CXX_FLAGS: -utf-8
          CMAKE_C_FLAGS_RELEASE: -MT -O2 -Ob2 -DNDEBUG -utf-8
          CMAKE_CXX_FLAGS_RELEASE: -MT -O2 -Ob2 -DNDEBUG -utf-8
        run: pnpm tauri build --bundles nsis

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtvt-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
