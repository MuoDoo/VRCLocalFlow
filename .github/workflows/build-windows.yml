name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.8.0
        with:
          workspaces: .
          key: sidecar-v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install

      # ---- Step 1: Build CPU engine (no GPU SDK needed) ----
      # ct2rs requires static CRT (+crt-static) on Windows — it compiles
      # CTranslate2 with /MT. We must match by telling Rust to also use /MT.
      - name: Build rtvt-engine (CPU)
        env:
          CFLAGS: -utf-8
          CXXFLAGS: -utf-8
          CMAKE_C_FLAGS: -utf-8
          CMAKE_CXX_FLAGS: -utf-8
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build -p rtvt-engine --release

      - name: Copy CPU engine binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          Copy-Item target/release/rtvt-engine.exe src-tauri/binaries/rtvt-engine-cpu.exe

      # ---- Step 2: Build CUDA engine ----
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust", "visual_studio_integration"]'

      # CTranslate2 uses the deprecated FindCUDA CMake module which breaks on
      # CMake 3.30+ (CMP0146 removes FindCUDA; Windows backslash paths cause
      # "Invalid character escape '\P'" in the fallback module). Downgrade to
      # CMake 3.29 which still has working FindCUDA.
      - name: Install CMake 3.29 (FindCUDA compat)
        run: pip install cmake==3.29.6

      - name: Build rtvt-engine (CUDA)
        env:
          CFLAGS: -utf-8
          CXXFLAGS: -utf-8
          CMAKE_C_FLAGS: -utf-8
          CMAKE_CXX_FLAGS: -utf-8
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build -p rtvt-engine --release --features cuda

      - name: Copy CUDA engine binary
        shell: pwsh
        run: |
          Copy-Item target/release/rtvt-engine.exe src-tauri/binaries/rtvt-engine-cuda.exe

      # ---- Step 3: Build Vulkan engine ----
      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $ver = "1.3.290.0"
          $installer = "$env:TEMP\VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe" -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          $sdkPath = "C:\VulkanSDK\$ver"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH

      - name: Build rtvt-engine (Vulkan)
        env:
          CFLAGS: -utf-8
          CXXFLAGS: -utf-8
          CMAKE_C_FLAGS: -utf-8
          CMAKE_CXX_FLAGS: -utf-8
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build -p rtvt-engine --release --features vulkan

      - name: Copy Vulkan engine binary
        shell: pwsh
        run: |
          Copy-Item target/release/rtvt-engine.exe src-tauri/binaries/rtvt-engine-vulkan.exe

      # ---- Step 4: Build Tauri app (UI + audio only, no GPU features) ----
      - name: Build Tauri app (NSIS installer)
        env:
          CFLAGS: -utf-8
          CXXFLAGS: -utf-8
          # Override tauri.conf.json to bundle engine binaries as resources
          TAURI_CONFIG: '{"bundle":{"resources":{"binaries/*":"./"}}}'
        run: pnpm tauri build --bundles nsis

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtvt-windows-installer
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error
