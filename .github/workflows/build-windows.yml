name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET_TRIPLE: x86_64-pc-windows-msvc

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.8.0
        with:
          workspaces: .
          key: sidecar-v8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install

      - name: Create binaries directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path src-tauri/binaries

      # ---- Step 1: Build CPU engine (no GPU SDK needed) ----
      - name: Build rtvt-engine (CPU)
        env:
          CFLAGS: -utf-8
          CXXFLAGS: -utf-8
          CMAKE_C_FLAGS: -utf-8
          CMAKE_CXX_FLAGS: -utf-8
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build -p rtvt-engine --release

      - name: Copy CPU engine binary
        shell: pwsh
        run: |
          Copy-Item target/release/rtvt-engine.exe "src-tauri/binaries/rtvt-engine-cpu-${env:TARGET_TRIPLE}.exe"

      # ---- Step 2: Build CUDA engine ----
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "curand", "curand_dev", "thrust", "visual_studio_integration"]'

      # FindCUDA.cmake fails when CUDA_PATH has backslashes (\P escape error).
      - name: Normalize CUDA_PATH for CMake
        shell: pwsh
        run: |
          $fixed = $env:CUDA_PATH -replace '\\', '/'
          echo "CUDA_PATH=$fixed" >> $env:GITHUB_ENV
          echo "CUDA_PATH_V12_6=$fixed" >> $env:GITHUB_ENV

      # CUDA build: ct2rs .static_crt(true) hardcodes /MT for C/CXX.
      # nvcc defaults to /MD for CUDA host code (LNK2038 mismatch).
      # Fix: CMAKE_POLICY_DEFAULT_CMP0091=NEW enables CMAKE_MSVC_RUNTIME_LIBRARY
      # for ALL languages including CUDA. MultiThreaded = /MT, matching ct2rs.
      # whisper-rs-sys passes all CMAKE_* env vars as cmake -D defines.
      - name: Build rtvt-engine (CUDA)
        continue-on-error: true
        env:
          CFLAGS: -utf-8
          CXXFLAGS: -utf-8
          CMAKE_C_FLAGS: -utf-8
          CMAKE_CXX_FLAGS: -utf-8
          RUSTFLAGS: -C target-feature=+crt-static
          CMAKE_POLICY_DEFAULT_CMP0091: NEW
          CMAKE_MSVC_RUNTIME_LIBRARY: MultiThreaded
        run: cargo build -p rtvt-engine --release --features cuda

      - name: Copy CUDA engine binary
        continue-on-error: true
        shell: pwsh
        run: |
          if (Test-Path target/release/rtvt-engine.exe) {
            $size = (Get-Item target/release/rtvt-engine.exe).Length
            # Only copy if it's a CUDA build (larger than CPU-only, >30MB indicates CUDA linked)
            if ($size -gt 30MB) {
              Copy-Item target/release/rtvt-engine.exe "src-tauri/binaries/rtvt-engine-cuda-${env:TARGET_TRIPLE}.exe"
            } else {
              Write-Host "Skipping CUDA copy - binary appears to be from previous non-CUDA build"
            }
          }

      # ---- Step 3: Build Vulkan engine ----
      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $ver = "1.3.290.0"
          $installer = "$env:TEMP\VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe" -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          $sdkPath = "C:\VulkanSDK\$ver"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH

      - name: Build rtvt-engine (Vulkan)
        env:
          CFLAGS: -utf-8
          CXXFLAGS: -utf-8
          CMAKE_C_FLAGS: -utf-8
          CMAKE_CXX_FLAGS: -utf-8
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build -p rtvt-engine --release --features vulkan

      - name: Copy Vulkan engine binary
        shell: pwsh
        run: |
          Copy-Item target/release/rtvt-engine.exe "src-tauri/binaries/rtvt-engine-vulkan-${env:TARGET_TRIPLE}.exe"

      # ---- Step 4: List bundled binaries ----
      - name: List engine binaries
        shell: pwsh
        run: Get-ChildItem src-tauri/binaries/ | Format-Table Name, Length

      # ---- Step 5: Build Tauri app (UI + audio only, no GPU features) ----
      - name: Build Tauri app (NSIS installer)
        shell: pwsh
        env:
          CFLAGS: -utf-8
          CXXFLAGS: -utf-8
        run: |
          # Detect which engine binaries were built successfully
          $bins = @()
          foreach ($variant in @("cpu", "cuda", "vulkan")) {
            $path = "src-tauri/binaries/rtvt-engine-$variant-${env:TARGET_TRIPLE}.exe"
            if (Test-Path $path) {
              $bins += "binaries/rtvt-engine-$variant"
              $size = [math]::Round((Get-Item $path).Length / 1MB, 1)
              Write-Host "  Bundle: rtvt-engine-$variant ($size MB)"
            }
          }
          # Write config to file (avoids PowerShell JSON quoting issues with CLI args)
          @{ bundle = @{ externalBin = $bins } } | ConvertTo-Json -Depth 3 |
            Set-Content -Path bundle-config.json -Encoding utf8
          Write-Host "Bundle config: $(Get-Content bundle-config.json -Raw)"
          pnpm tauri build --bundles nsis --config bundle-config.json

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtvt-windows-installer
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error
